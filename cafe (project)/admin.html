<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Brew & Bloom</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0; 
    width: 100%;
    padding: 15px 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #6F4E37; /* ✅ your color */
    z-index: 100;
}

.logo {
    font-weight: bold;
    font-size: 1.5rem;
    color: white;
    text-decoration: none;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 30px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
}

.nav-links a:hover { 
    color: #FFD700; 
}

.nav-icons {
    display: flex;
    gap: 20px;
}

.nav-icons a {
    color: white;
    font-size: 1.2rem;
}

/* MAIN CONTENT */
.container {
    max-width: 1000px;
    margin: 100px auto 20px; /* ✅ fix overlap */
    padding: 20px;
}

h1 {
    text-align: center;
    color: #4E342E;
}

.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
    padding: 10px;
    margin: 5px;
    width: 30%;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #6F4E37;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #5a3d2b;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: #6F4E37;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

.total {
    text-align: right;
    margin-top: 10px;
    font-weight: bold;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}
</style>
</head>

<body>

<!-- ✅ NAVBAR inside body -->
<nav class="navbar">
    <a href="index.html" class="logo">Brew & Bloom</a>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="order online.html">Order Online</a></li>
    </ul>

    <div class="nav-icons">
        <a>🛒</a>
        <a href="#" id="authLink" onclick="logoutAdmin()">Logout</a>
    </div>
</nav>

<div class="container">

<h1>☕ Brew & Bloom Dashboard</h1>

<div class="stats-grid">
    <div class="card"><h3>Orders</h3><p id="statOrders">0</p></div>
    <div class="card"><h3>Revenue</h3><p id="statRevenue">₹0</p></div>
    <div class="card"><h3>Users</h3><p id="statUsers">0</p></div>
    <div class="card"><h3>Reviews</h3><p id="statReviews">0</p></div>
</div>

<div class="card">
    <h2>Manage Categories</h2>
    <input type="text" id="catName" placeholder="Category Name" style="width: 70%;">
    <button onclick="addCategory()">Add Category</button>
    <table id="categoryTable">
        <tr><th>ID</th><th>Name</th><th>Action</th></tr>
    </table>
</div>

<div class="card">
    <h2>Add Menu Item</h2>
    <select id="itemCat" style="padding: 10px; margin: 5px; width: 32%; border-radius: 5px;"></select>
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemPrice" placeholder="Price">
    <input type="text" id="itemDesc" placeholder="Description" style="width: 95%;">
    <button onclick="addItem()">Add</button>

    <table id="menuTable">
        <tr><th>ID</th><th>Category</th><th>Name</th><th>Price</th><th>Action</th></tr>
    </table>
</div>

<div class="card">
    <h2>Orders</h2>
    <button onclick="clearHistory()" style="margin-bottom: 10px; background-color: #c9302c;">Clear History</button>

    <table id="orderTable">
        <tr>
            <th>ID</th>
            <th>Item</th>
            <th>Price</th>
            <th>Status</th>
        </tr>
    </table>

    <div class="total" id="totalRevenue">Total: ₹0</div>
</div>

<div class="card">
    <h2>Manage Users</h2>
    <table id="userTable">
        <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Action</th></tr>
    </table>
</div>

</div>

<script>
function checkAdminAccess() {
    fetch('api.php?action=getProfile')
    .then(res => res.json())
    .then(data => {
        const navIcons = document.querySelector('.nav-icons');
        if (!data.authenticated || data.role !== 'admin') {
            alert("Admin access required.");
            window.location.href = "cafe login.html?redirect=admin.html";
        } else {
            navIcons.innerHTML = `
                <a>🛒</a>
                <a href="profile.html">Profile</a>
                <a href="#" id="authLink">Logout</a>
            `;
            document.getElementById('authLink').onclick = function(e) {
                e.preventDefault();
                logoutAdmin();
            };
            refreshAll();
        }
    });
}

function logoutAdmin() {
    if (confirm("Logout from Admin Dashboard?")) {
        fetch('api.php?action=logout', { method: 'POST' })
            .then(() => window.location.href = "index.html");
    }
}

window.onload = checkAdminAccess;

function refreshAll() {
    loadStats();
    loadOrders();
    loadCategories();
    loadMenu();
    loadUsers();
}

function loadStats() {
    fetch('api.php?action=getStats').then(res => res.json()).then(data => {
        document.getElementById('statOrders').innerText = data.total_orders;
        document.getElementById('statRevenue').innerText = '₹' + parseFloat(data.total_revenue).toFixed(2);
        document.getElementById('statUsers').innerText = data.total_users;
        document.getElementById('statReviews').innerText = data.total_reviews;
    });
}

function loadOrders() {
    let table = document.getElementById("orderTable");
    while (table.rows.length > 1) {
        table.deleteRow(1);
    }

    fetch('api.php?action=getOrders')
    .then(res => res.json())
    .then(data => {
        let total = 0;
        data.forEach(o => {
            let row = table.insertRow();
            row.innerHTML = `
                <td>${o.id}</td>
                <td>${o.items}</td>
                <td>₹${o.total}</td>
                <td>${o.status}</td>
            `;
            total += parseFloat(o.total);
        });
        document.getElementById("totalRevenue").innerText = "Total: ₹" + total.toFixed(2);
    });
}

function loadCategories() {
    fetch('api.php?action=getCategories').then(res => res.json()).then(data => {
        const table = document.getElementById('categoryTable');
        const select = document.getElementById('itemCat');
        while(table.rows.length > 1) table.deleteRow(1);
        select.innerHTML = '';
        data.forEach(c => {
            let row = table.insertRow();
            row.innerHTML = `<td>${c.id}</td><td>${c.name}</td><td><button onclick="deleteData('Category', ${c.id})" style="background:red;">Delete</button></td>`;
            select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    });
}

function loadMenu() {
    fetch('api.php?action=getMenu').then(res => res.json()).then(data => {
        const table = document.getElementById('menuTable');
        while(table.rows.length > 1) table.deleteRow(1);
        data.forEach(m => {
            let row = table.insertRow();
            row.innerHTML = `<td>${m.id}</td><td>${m.category_name}</td><td>${m.name}</td><td>₹${m.price_large}</td><td><button onclick="deleteData('MenuItem', ${m.id})" style="background:red;">Delete</button></td>`;
        });
    });
}

function loadUsers() {
    fetch('api.php?action=getUsers').then(res => res.json()).then(data => {
        const table = document.getElementById('userTable');
        while(table.rows.length > 1) table.deleteRow(1);
        data.forEach(u => {
            let row = table.insertRow();
            row.innerHTML = `<td>${u.id}</td><td>${u.username}</td><td>${u.email}</td><td>${u.role}</td><td><button onclick="deleteData('User', ${u.id})" style="background:red;">Delete</button></td>`;
        });
    });
}

function addItem() {
    const payload = {
        category_id: document.getElementById('itemCat').value,
        name: document.getElementById('itemName').value,
        price: document.getElementById('itemPrice').value,
        description: document.getElementById('itemDesc').value
    };
    fetch('api.php?action=addMenuItem', { method: 'POST', body: JSON.stringify(payload) })
    .then(() => {
        refreshAll();
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemDesc').value = '';
    });
}

function addCategory() {
    const name = document.getElementById('catName').value;
    fetch('api.php?action=addCategory', { method: 'POST', body: JSON.stringify({ name }) })
    .then(() => {
        refreshAll();
        document.getElementById('catName').value = '';
    });
}

function deleteData(type, id) {
    if(confirm(`Are you sure you want to delete this ${type}?`)) {
        fetch(`api.php?action=delete${type}`, { method: 'POST', body: JSON.stringify({ id }) })
        .then(() => refreshAll());
    }
}

function clearHistory() {
    if (confirm("Are you sure you want to clear all order history? This cannot be undone.")) {
        fetch('api.php?action=clearHistory', { method: 'POST' })
        .then(() => refreshAll());
    }
}
</script>
</body>
</html>
